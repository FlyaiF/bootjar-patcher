name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run real Spring Boot integration tests
        run: cargo test -p bootjar-spring-it -- --ignored

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: bootjar-patcher
          - name: x86_64-apple-darwin
            os: macos-latest
            binary: bootjar-patcher
          - name: x86_64-pc-windows-msvc
            os: windows-latest
            binary: bootjar-patcher.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p bootjar-patcher --release

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          fi
          asset="bootjar-patcher-${version}-${{ matrix.name }}.tar.gz"
          mkdir -p "dist/bootjar-patcher"
          cp "target/release/${{ matrix.binary }}" "dist/bootjar-patcher/"
          cp "crates/bootjar-cli/RUNBOOK.md" "dist/bootjar-patcher/"
          tar -C dist -czf "${asset}" bootjar-patcher
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${asset}" > "${asset}.sha256"
          else
            sha256sum "${asset}" > "${asset}.sha256"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootjar-patcher-${{ matrix.name }}
          path: |
            bootjar-patcher-*.tar.gz
            bootjar-patcher-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
